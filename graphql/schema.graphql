"""
Register user with fields defined in the settings.

If the email field of the user model is part of the
registration fields (default), check if there is
no user with that email or as a secondary email.

If it exists, it does not register the user,
even if the email field is not defined as unique
(default of the default django user model).

When creating the user, it also creates a `UserModel`
related to that user, making it possible to track
if the user is archived, verified and has a secondary
email.

Send account verification email.

If allowed to not verified users login, return token.
"""
type RegisterPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input RegisterInput {
  clientMutationId: String
  phoneNumber: String
  firstName: String!
  lastName: String!
  email: String!
  role: String!
  password1: String!
  password2: String!
}

"""
Verify user account.

Receive the token that was sent by email.
If the token is valid, make the user verified
by making the `user.verified` field true.
"""
type VerifyAccountPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input VerifyAccountInput {
  clientMutationId: String
  token: String!
}

"""
Sends activation email.

It is called resend because theoretically
the first activation email was sent when
the user registered.

If there is no user with the requested email,
a successful response is returned.
"""
type ResendActivationEmailPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input ResendActivationEmailInput {
  clientMutationId: String
  email: String!
}

"""
Send password reset email.

For non verified users, send an activation
email instead.

Accepts both primary and secondary email.

If there is no user with the requested email,
a successful response is returned.
"""
type SendPasswordResetEmailPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input SendPasswordResetEmailInput {
  clientMutationId: String
  email: String!
}

"""
Change user password without old password.

Receive the token that was sent by email.

If token and new passwords are valid, update
user password and in case of using refresh
tokens, revoke all of them.

Also, if user has not been verified yet, verify it.
"""
type PasswordResetPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input PasswordResetInput {
  clientMutationId: String
  token: String!
  newPassword1: String!
  newPassword2: String!
}

"""
Set user password - for passwordless registration

Receive the token that was sent by email.

If token and new passwords are valid, set
user password and in case of using refresh
tokens, revoke all of them.

Also, if user has not been verified yet, verify it.
"""
type PasswordSetPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input PasswordSetInput {
  clientMutationId: String
  token: String!
  newPassword1: String!
  newPassword2: String!
}

"""
Change account password when user knows the old password.

A new token and refresh token are sent. User must be verified.
"""
type PasswordChangePayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
  refreshToken: String
}

input PasswordChangeInput {
  clientMutationId: String
  oldPassword: String!
  newPassword1: String!
  newPassword2: String!
}

"""
Archive account and revoke refresh tokens.

User must be verified and confirm password.
"""
type ArchiveAccountPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input ArchiveAccountInput {
  clientMutationId: String
  password: String!
}

"""
Delete account permanently or make `user.is_active=False`.

The behavior is defined on settings.
Anyway user refresh tokens are revoked.

User must be verified and confirm password.
"""
type DeleteAccountPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input DeleteAccountInput {
  clientMutationId: String
  password: String!
}

"""
Send activation to secondary email.

User must be verified and confirm password.
"""
type SendSecondaryEmailActivationPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input SendSecondaryEmailActivationInput {
  clientMutationId: String
  email: String!
  password: String!
}

"""
Verify user secondary email.

Receive the token that was sent by email.
User is already verified when using this mutation.

If the token is valid, add the secondary email
to `user.secondary_email` field.

Note that until the secondary email is verified,
it has not been saved anywhere beyond the token,
so it can still be used to create a new account.
After being verified, it will no longer be available.
"""
type VerifySecondaryEmailPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input VerifySecondaryEmailInput {
  clientMutationId: String
  token: String!
}

"""
Swap between primary and secondary emails.

Require password confirmation.
"""
type SwapEmailsPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input SwapEmailsInput {
  clientMutationId: String
  password: String!
}

"""
Remove user secondary email.

Require password confirmation.
"""
type RemoveSecondaryEmailPayload {
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input RemoveSecondaryEmailInput {
  clientMutationId: String
  password: String!
}

"""
Obtain JSON web token for given user.

Allow to perform login with different fields,
and secondary email if set. The fields are
defined on settings.

Not verified users can login by default. This
can be changes on settings.

If user is archived, make it unarchive and
return `unarchiving=True` on output.
"""
type ObtainJSONWebTokenPayload {
  payload: GenericScalar
  refreshExpiresIn: Int
  success: Boolean
  errors: ExpectedErrorType
  user: UserNode
  unarchiving: Boolean
  clientMutationId: String
  token: String
  refreshToken: String
}

input ObtainJSONWebTokenInput {
  clientMutationId: String
  password: String!
  email: String
  username: String
}

"""Same as `grapgql_jwt` implementation, with standard output."""
type VerifyTokenPayload {
  payload: GenericScalar
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input VerifyTokenInput {
  token: String!
  clientMutationId: String
}

"""Same as `grapgql_jwt` implementation, with standard output."""
type RefreshTokenPayload {
  payload: GenericScalar
  refreshExpiresIn: Int
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
  token: String
  refreshToken: String
}

input RefreshTokenInput {
  refreshToken: String
  clientMutationId: String
}

"""Same as `grapgql_jwt` implementation, with standard output."""
type RevokeTokenPayload {
  revoked: Int!
  success: Boolean
  errors: ExpectedErrorType
  clientMutationId: String
}

input RevokeTokenInput {
  refreshToken: String!
  clientMutationId: String
}

