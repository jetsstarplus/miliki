query GatewayCredentialListData($companyId: ID!) {
  gatewayCredentialListData(companyId: $companyId)
}

query GatewayCredentialFormDataCreate {
  gatewayCredentialFormData
}

query GatewayCredentialFormDataEdit($credentialId: ID!) {
  gatewayCredentialFormData(credentialId: $credentialId)
}

query GatewayCredentialDeleteData($credentialId: ID!) {
  gatewayCredentialDeleteData(credentialId: $credentialId)
}

query GatewayCredentialCallbackHistoryData($credentialId: ID!) {
  gatewayCredentialCallbackHistoryData(credentialId: $credentialId)
}

mutation CreateGatewayCredential($input: CreateGatewayCredentialInput!) {
  createGatewayCredential(input: $input) {
    success
    message
    gatewayCredential {
      id
      gatewayCode
      name
    }
  }
}

mutation UpdateGatewayCredential($input: UpdateGatewayCredentialInput!) {
  updateGatewayCredential(input: $input) {
    success
    message
    gatewayCredential {
      id
      gatewayCode
      name
    }
  }
}

mutation DeleteGatewayCredentialRelay($input: DeleteGatewayCredentialRelayInput!) {
  deleteGatewayCredentialRelay(input: $input) {
    success
    message
    credentialId
  }
}

mutation RotateGatewayWebhookCredentials($input: RotateGatewayWebhookCredentialsInput!) {
  rotateGatewayWebhookCredentials(input: $input) {
    success
    message
    credentialId
    webhookClientKey
    webhookClientSecret
    webhookBasicAuthHeader
  }
}
